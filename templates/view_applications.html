<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>My Applications</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="topbar">My Applications</div>
  <div class="container">
    <table class="styled-table">
      <thead>
        <tr><th>Application No</th><th>Status</th><th>Actions</th></tr>
      </thead>
      <tbody>
        {% for app in user_apps %}
        <tr>
          <td>{{ app.application_no }}</td>
          <td>
            {% if app.status == 'accepted' %}✅ Accepted
            {% elif app.status == 'rejected' %}❌ Rejected
            {% else %}🕒 On Process
            {% endif %}
          </td>
          <td>
            <a class="btn small" href="{{ url_for('user_view', app_no=app.application_no) }}">View</a>
            <a class="btn small" href="{{ url_for('edit_application', app_no=app.application_no) }}">Edit</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
